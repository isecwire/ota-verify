<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', Menlo, Monaco, 'Courier New', monospace">
  <!-- Window frame -->
  <rect width="900" height="500" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- macOS title bar -->
  <rect width="900" height="36" rx="10" ry="10" fill="#181825"/>
  <rect x="0" y="20" width="900" height="16" fill="#181825"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#febc2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="450" y="22" text-anchor="middle" font-size="13px" fill="#cdd6f4">ota-verify -- gateway-update-2.1.0</text>

  <!-- Terminal content -->
  <g font-size="13.5">

    <!-- Header -->
    <text x="24" y="64" fill="#cdd6f4" font-weight="bold">ota-verify v1.0.0</text>
    <text x="170" y="64" fill="#6c7086"> -- OTA Package Verifier</text>

    <!-- Package info -->
    <text x="24" y="90" fill="#6c7086">Package:</text>
    <text x="100" y="90" fill="#89b4fa" font-weight="bold">gateway-update-2.1.0/</text>

    <!-- Manifest info -->
    <text x="24" y="112" fill="#6c7086">Manifest:</text>
    <text x="108" y="112" fill="#cdd6f4">manifest.json</text>
    <text x="232" y="112" fill="#6c7086">(schema v2, Ed25519)</text>

    <!-- Separator -->
    <text x="24" y="138" fill="#45475a">------------------------------------------------------------</text>

    <!-- Check 1: Signature -->
    <text x="24" y="162" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="162" fill="#cdd6f4">Signature valid</text>
    <text x="176" y="162" fill="#6c7086">(Ed25519, key: a3f2...8b1c)</text>

    <!-- Check 2: Certificate chain -->
    <text x="24" y="184" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="184" fill="#cdd6f4">Certificate chain verified</text>
    <text x="266" y="184" fill="#6c7086">(2 certificates)</text>

    <!-- Check 3: Partition rootfs -->
    <text x="24" y="206" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="206" fill="#cdd6f4">Partition</text>
    <text x="126" y="206" fill="#89b4fa">rootfs.img</text>
    <text x="218" y="206" fill="#cdd6f4">present</text>
    <text x="282" y="206" fill="#6c7086">(148.2 MiB)</text>

    <!-- Check 4: Partition kernel -->
    <text x="24" y="228" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="228" fill="#cdd6f4">Partition</text>
    <text x="126" y="228" fill="#89b4fa">kernel.img</text>
    <text x="218" y="228" fill="#cdd6f4">present</text>
    <text x="282" y="228" fill="#6c7086">(8.4 MiB)</text>

    <!-- Check 5: Hash rootfs -->
    <text x="24" y="250" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="250" fill="#cdd6f4">SHA-256 hash match:</text>
    <text x="222" y="250" fill="#89b4fa">rootfs.img</text>

    <!-- Check 6: Hash kernel -->
    <text x="24" y="272" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="272" fill="#cdd6f4">SHA-256 hash match:</text>
    <text x="222" y="272" fill="#89b4fa">kernel.img</text>

    <!-- Check 7: Version rollback -->
    <text x="24" y="294" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="294" fill="#cdd6f4">Version</text>
    <text x="108" y="294" fill="#89b4fa" font-weight="bold">2.1.0</text>
    <text x="156" y="294" fill="#cdd6f4">&gt; rollback minimum</text>
    <text x="338" y="294" fill="#f9e2af">1.9.0</text>

    <!-- Check 8: Manifest age -->
    <text x="24" y="316" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="316" fill="#cdd6f4">Manifest age:</text>
    <text x="166" y="316" fill="#cdd6f4" font-weight="bold">2h 14m</text>
    <text x="232" y="316" fill="#6c7086">(limit: 72h)</text>

    <!-- Check 9: Size check -->
    <text x="24" y="338" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="338" fill="#cdd6f4">Size check:</text>
    <text x="150" y="338" fill="#cdd6f4" font-weight="bold">156.6 MiB</text>
    <text x="254" y="338" fill="#cdd6f4">fits in</text>
    <text x="314" y="338" fill="#f9e2af">256 MiB</text>
    <text x="382" y="338" fill="#cdd6f4">partition</text>

    <!-- Check 10: Policy -->
    <text x="24" y="360" fill="#50fa7b" font-weight="bold">&#x2713;</text>
    <text x="44" y="360" fill="#cdd6f4">Policy: all</text>
    <text x="140" y="360" fill="#cdd6f4" font-weight="bold">5</text>
    <text x="154" y="360" fill="#cdd6f4">rules passed</text>

    <!-- Separator -->
    <text x="24" y="388" fill="#45475a">------------------------------------------------------------</text>

    <!-- Result -->
    <text x="24" y="416" fill="#50fa7b" font-weight="bold" font-size="15">VERIFIED</text>
    <text x="110" y="416" fill="#50fa7b" font-size="15"> -- Package is authentic and ready to install</text>

    <!-- Audit log -->
    <text x="24" y="448" fill="#6c7086">Audit log written to</text>
    <text x="210" y="448" fill="#89b4fa">audit-2026-04-03.json</text>

    <!-- Prompt -->
    <text x="24" y="478" fill="#6c7086">$</text>
    <rect x="36" y="466" width="8" height="16" fill="#cdd6f4" opacity="0.7"/>

  </g>
</svg>
